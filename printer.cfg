#####################################################################
# HEATER_BED
#####################################################################
[heater_bed]
#control = pid
#pid_kp = 43.328
#pid_ki = 1.992
#pid_kd = 235.597


#####################################################################
# EXTRUDER
#####################################################################
[extruder]
#control = pid
#pid_kp = 33.176
#pid_ki = 3.626
#pid_kd = 75.890
max_extrude_only_distance: 1000
max_extrude_cross_section: 50
max_extrude_only_velocity: 500
max_extrude_only_accel: 5000
instantaneous_corner_velocity: 1.0
pressure_advance: 0.028
pressure_advance_smooth_time: 0.04

[firmware_retraction_zhop]
retract_length: 1.2
retract_speed: 30
unretract_speed: 30
unretract_extra_length: 0.0
z_hop_height: 0.4
clear_zhop_on_z_moves: false

#####################################################################
# INPUT SHAPER
#####################################################################
[input_shaper]
#shaper_type_x = 2hump_ei
#shaper_freq_x = 93.4
#shaper_type_y = mzv
#shaper_freq_y = 45.0
#shaper_type_z = mzv
#shaper_freq_z = 62.4
damping_ratio_x: 0.1
damping_ratio_y: 0.1
damping_ratio_z: 0.1

[resonance_tester]
probe_points: 175, 175, 20
accel_chip: adxl345 cartographer
#accel_chip_x:
#accel_chip_y:
accel_chip_z: adxl345 cartographer
#max_smoothing: 0
min_freq: 5
max_freq: 135
accel_per_hz: 60
hz_per_sec: 1
move_speed: 100
sweeping_accel: 400
sweeping_period: 1.2
sweeping_accel_z: 50
max_freq_z: 100
accel_per_hz_z: 15



